<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 210" width="320" height="210">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </defs>

  <!-- Outer window -->
  <g filter="url(#shadow)">
    <rect x="2" y="2" width="316" height="206" rx="10" fill="#121218" stroke="#3c3c50" stroke-width="1" stroke-opacity="0.55"/>
    <rect x="2" y="2" width="316" height="24" rx="10" fill="#1e1e28"/>
    <rect x="2" y="16" width="316" height="10" fill="#1e1e28"/>
    <line x1="2" y1="26" x2="318" y2="26" stroke="#3c3c50" stroke-width="0.4" stroke-opacity="0.7"/>
    <circle cx="14" cy="14" r="3.5" fill="#ff5f57"/>
    <circle cx="24" cy="14" r="3.5" fill="#febc2e"/>
    <circle cx="34" cy="14" r="3.5" fill="#28c840"/>
    <text class="mono" x="50" y="17" font-size="9" fill="#b4b4ff" font-weight="700">scrn</text>
    <text class="mono" x="70" y="17" font-size="7.5" fill="#505064">v4.4.0</text>
  </g>

  <!-- Column headers -->
  <text class="mono" x="10" y="35" font-size="6.5" fill="#b4b4c8" font-weight="600">Name</text>
  <text class="mono" x="200" y="35" font-size="6.5" fill="#b4b4c8" font-weight="600">Status</text>

  <!-- Constants band (reddish) -->
  <rect x="4" y="40" width="312" height="28" fill="#231018"/>
  <rect x="4" y="49" width="312" height="9" fill="#301621" opacity="0.85"/>

  <text class="mono" x="10" y="47" font-size="7" fill="#64646e">1</text>
  <text class="mono" x="22" y="47" font-size="7" fill="#50c878" font-weight="600">notes</text>
  <text class="mono" x="200" y="47" font-size="7" fill="#a0be8c">timer-daemon</text>

  <text class="mono" x="10" y="56" font-size="7" fill="#64646e">2</text>
  <text class="mono" x="22" y="56" font-size="7" fill="#50c878" font-weight="600">docker</text>
  <text class="mono" x="200" y="56" font-size="7" fill="#a0be8c">context ls</text>

  <text class="mono" x="10" y="65" font-size="7" fill="#64646e">3</text>
  <text class="mono" x="22" y="65" font-size="7" fill="#50c878" font-weight="600">logs</text>
  <text class="mono" x="200" y="65" font-size="7" fill="#64646e">—</text>

  <line x1="6" y1="71" x2="314" y2="71" stroke="#3c3c50" stroke-width="0.4" stroke-opacity="0.7"/>

  <!-- Pinned section label -->
  <text class="mono" x="10" y="81" font-size="6.5" fill="#8c78b4" letter-spacing="0.5" opacity="0.85">— Pinned</text>

  <!-- Folder row (expanded) on pinned-tinted bg -->
  <rect x="4" y="85" width="312" height="9" fill="#16141e"/>
  <text class="mono" x="10" y="91.5" font-size="7" fill="#8c78b4" font-weight="700">▾ proj/core/</text>

  <!-- cart-api (inactive) -->
  <text class="mono" x="22" y="100.5" font-size="7" fill="#b4b4c8">cart-api</text>
  <text class="mono" x="200" y="100.5" font-size="7" fill="#64646e">—</text>

  <!-- checkout (inactive, zebra) -->
  <rect x="4" y="104" width="312" height="9" fill="#1e1e28"/>
  <text class="mono" x="22" y="110.5" font-size="7" fill="#b4b4c8">checkout</text>
  <text class="mono" x="200" y="110.5" font-size="7" fill="#64646e">—</text>

  <!-- inventory (active, 1 pill idle) -->
  <text class="mono" x="22" y="119.5" font-size="7" fill="#50c878" font-weight="600">inventory</text>
  <rect x="88" y="113.5" width="11" height="8.5" rx="1.5" fill="#2d2d41"/>
  <text class="mono" x="93.5" y="120" font-size="6" fill="#dcdce6" text-anchor="middle" font-weight="600">1</text>
  <text class="mono" x="200" y="119.5" font-size="7" fill="#a0be8c">cargo test</text>

  <!-- SELECTED: notifications (pills 1 active + 2 proc running) -->
  <rect x="4" y="123" width="312" height="10" fill="#373750"/>
  <rect x="4" y="123" width="3" height="10" fill="#b4b4ff"/>
  <text class="mono" x="22" y="130" font-size="7" fill="#50c878" font-weight="700">notifications</text>
  <rect x="110" y="124" width="11" height="8.5" rx="1.5" fill="#5082c8"/>
  <text class="mono" x="115.5" y="130.5" font-size="6" fill="#ffffff" text-anchor="middle" font-weight="700">1</text>
  <rect x="124" y="124" width="11" height="8.5" rx="1.5" fill="#375a37"/>
  <text class="mono" x="129.5" y="130.5" font-size="6" fill="#dcdce6" text-anchor="middle" font-weight="600">2</text>
  <text class="mono" x="200" y="130" font-size="7" fill="#a0be8c" font-weight="700">node opencode</text>

  <!-- orders (active) -->
  <text class="mono" x="22" y="139" font-size="7" fill="#50c878" font-weight="600">orders</text>
  <text class="mono" x="200" y="139" font-size="7" fill="#a0be8c">jest --watch</text>

  <!-- payments (inactive, zebra) -->
  <rect x="4" y="142" width="312" height="9" fill="#1e1e28"/>
  <text class="mono" x="22" y="148.5" font-size="7" fill="#b4b4c8">payments</text>
  <text class="mono" x="200" y="148.5" font-size="7" fill="#64646e">—</text>

  <!-- users (active, pill 1) -->
  <text class="mono" x="22" y="157.5" font-size="7" fill="#50c878" font-weight="600">users</text>
  <rect x="65" y="151.5" width="11" height="8.5" rx="1.5" fill="#2d2d41"/>
  <text class="mono" x="70.5" y="158" font-size="6" fill="#dcdce6" text-anchor="middle" font-weight="600">1</text>
  <text class="mono" x="200" y="157.5" font-size="7" fill="#a0be8c">pnpm dev</text>

  <line x1="6" y1="164" x2="314" y2="164" stroke="#3c3c50" stroke-width="0.4" stroke-opacity="0.7"/>

  <!-- Recents label -->
  <text class="mono" x="10" y="174" font-size="6.5" fill="#8c78b4" letter-spacing="0.5" opacity="0.85">— Recents</text>

  <!-- Recent row: notifications-2 -->
  <text class="mono" x="22" y="186" font-size="7" fill="#50c878" font-weight="600">↳ notifications-2</text>
  <text class="mono" x="200" y="186" font-size="7" fill="#a0be8c">claude</text>

  <!-- Bottom hint strip -->
  <text class="mono" x="10" y="201" font-size="5.5" fill="#64646e" opacity="0.85">↵ Attach  d Dup+label  ←/→ Pill  /  Search  c New  ` Back</text>
</svg>
